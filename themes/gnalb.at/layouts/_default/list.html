{{ define "main" }}
    <div class="item">
        <h2>{{.Title}}</h2>
    </div>
    <div class="item">
        <ul>
            {{ range .Pages }}
            <li>{{ .Date.Format "2006-01-02" }} <a href="{{ .Permalink }}">{{ .Title }}</a>
            </li>
            {{ end }}
        </ul>
    </div>
{{ end }}
